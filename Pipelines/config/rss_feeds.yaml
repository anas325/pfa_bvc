# RSS feeds for BVC (Casablanca Stock Exchange) news pipeline.
# Each feed entry: name, url, language (fr/ar/en), topics list.
# Set enabled: false to skip a feed without removing it.

feeds:
  # --- Moroccan financial press (French) ---
  - name: Médias24 Economie
    url: https://medias24.com/feed/economie
    language: fr
    topics: [economie, maroc, bourse]
    enabled: true

  - name: L'Economiste
    url: https://www.leconomiste.com/rss.xml
    language: fr
    topics: [economie, maroc, entreprises]
    enabled: true

  - name: actu-maroc
    url: https://actu-maroc.com/category/economie/feed/
    language: fr
    topics: [economie, maroc, entreprises]
    enabled: true

  - name: lavieeco
    url: https://www.lavieeco.com/feed/
    language: fr
    topics: [economie, maroc, entreprises]
    enabled: true

  - name: lereporter
    url: https://www.lereporter.ma/actualite-economie/feed/
    language: fr
    topics: [economie, maroc, entreprises]
    enabled: true

  - name: LeMatin Economie
    url: https://lematin.ma/rss/categorie/economie
    language: fr
    topics: [bourse, maroc, finance]
    enabled: true
    scraper: lematin

  - name: Challenge Maroc
    url: https://www.challenge.ma/feed/
    language: fr
    topics: [finance, maroc, bourse]
    enabled: true
    scraper : challenge

  - name: Hespress Economie
    url: https://fr.hespress.com/economie/feed
    language: fr
    topics: [economie, maroc]
    enabled: true

  - name: TelQuel Economie
    url: https://telquel.ma/feed/
    language: fr
    topics: [economie, maroc]
    enabled: true

  # --- Arabic language ---
  - name: Hespress Arabic
    url: https://www.hespress.com/feed
    language: ar
    topics: [اقتصاد, المغرب]
    enabled: true

  # --- International (English) ---
  - name: Reuters Business
    url: https://feeds.reuters.com/reuters/businessNews
    language: en
    topics: [business, finance]
    enabled: true

  - name: Bloomberg Middle East
    url: https://feeds.bloomberg.com/news/rss/middle-east
    language: en
    topics: [MENA, finance, markets]
    enabled: false  # may be gated

# Fetcher settings
fetcher:
  lookback_days: 7          # only fetch articles published within this window
  request_timeout: 15       # seconds per feed request
  user_agent: "BVC-Research-Bot/1.0"

# LLM settings (mirrors search_config.yaml style)
llm:
  analyzer: llm             # implementation to use — see rss/analyzer.py
  base_url: http://localhost:11434/v1
  model: llama3.1:8b 
  batch_size: 5             # articles per checkpoint/store cycle

  request_timeout: 120      # seconds per LLM call before giving up
  keep_alive: 0             # unload model from VRAM after each call (Ollama-specific; omit for cloud APIs)
  max_retries: 3            # retry a failed call this many times
  retry_delay: 5            # base delay in seconds; doubles each attempt (5s → 10s → 20s)
  inter_article_delay: 1    # seconds to pause between articles in the batch loop

  # Controls whether and how the company/sector lists are fed to the LLM.
  # Set enabled: false to skip entity extraction entirely (only sentiment returned).
  entity_extraction:
    enabled: true
    include_companies: true   # pass ticker+name list to the prompt
    include_sectors: true     # pass sector list to the prompt
